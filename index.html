<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gutey Guesser — 2026 NFL Draft</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a2e1a; }
    #loading {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; color: #FFB612;
      font-family: system-ui, sans-serif; font-size: 1.2rem;
    }
  </style>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"><div id="loading">Loading Gutey Guesser…</div></div>
  <script>
    // Polyfill window.storage to match Claude artifact API using localStorage
    window.storage = {
      _data: JSON.parse(localStorage.getItem('gutey-storage') || '{}'),
      async get(key) {
        const val = this._data[key];
        return val !== undefined ? { value: val } : null;
      },
      async set(key, value) {
        this._data[key] = value;
        localStorage.setItem('gutey-storage', JSON.stringify(this._data));
      }
    };

    fetch('gutey-guesser.jsx')
      .then(r => r.text())
      .then(code => {
        // Swap bare React import for global destructuring
        code = code.replace(
          /import\s*\{([^}]+)\}\s*from\s*["']react["'];?/,
          'const {$1} = React;'
        );
        // Convert export default to plain function declaration
        code = code.replace(
          /export\s+default\s+function\s+(\w+)/,
          'function $1'
        );
        // Mount the app
        code += '\nReactDOM.createRoot(document.getElementById("root")).render(React.createElement(GuteyGuesser));';

        const transformed = Babel.transform(code, { presets: ['react'] }).code;
        new Function(transformed)();
      })
      .catch(err => {
        document.getElementById('root').innerHTML =
          '<div style="color:#FFB612;padding:2rem;font-family:system-ui">' +
          '<h1>Failed to load</h1><p>' + err.message + '</p></div>';
      });
  </script>
</body>
</html>
